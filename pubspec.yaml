name: smart_coaching_app
description: Smart Coaching - Student & Teacher App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
